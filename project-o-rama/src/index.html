<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Alerts</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 2rem auto; padding: 0 1rem; line-height: 1.5; }
        form { display: flex; flex-direction: column; gap: 1rem; border: 1px solid #ccc; padding: 1.5rem; border-radius: 8px; }
        input { padding: 0.5rem; font-size: 1rem; }
        button { padding: 0.75rem; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 1rem; }
        button:hover { background: #0056b3; }
        #message { margin-top: 1rem; padding: 1rem; border-radius: 4px; display: none; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>
    <h1>Weather Alert Subscription</h1>
    <p>Enter your details below to receive email alerts when the temperature exceeds your threshold or severe weather is detected.</p>
    
    <form id="subscribeForm">
        <label for="email">Email Address:</label>
        <input type="email" id="email" required placeholder="you@example.com">
        
        <label for="city">City (e.g. Charlottesville, VA):</label>
        <input type="text" id="city" required placeholder="Charlottesville, VA">
        
        <label for="threshold">Temperature Threshold (°F):</label>
        <input type="number" id="threshold" value="95" required>
        
        <button type="submit">Subscribe</button>
    </form>

    <div id="message"></div>

    <script>
        const API_URL = 'https://96ryxwf16m.execute-api.us-east-1.amazonaws.com/Prod/'; // Replace with output from SAM deploy

        document.getElementById('subscribeForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const messageDiv = document.getElementById('message');
            messageDiv.style.display = 'none';

            const data = {
                email: document.getElementById('email').value,
                city: document.getElementById('city').value,
                threshold_temp: parseInt(document.getElementById('threshold').value)
            };

            try {
                const response = await fetch(`${API_URL}subscribe`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await response.json();
                
                if (response.ok) {
                    messageDiv.className = 'success';
                    messageDiv.textContent = result.message;
                } else {
                    messageDiv.className = 'error';
                    messageDiv.textContent = 'Error: ' + (result.error || 'Failed to subscribe');
                }
            } catch (err) {
                messageDiv.className = 'error';
                messageDiv.textContent = 'Error connecting to the server.';
            }
            messageDiv.style.display = 'block';
        });
    </script>
</body>
</html>
