AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Weather Alert Subscription Service

Globals:
  Function:
    Timeout: 30
    MemorySize: 128
    Runtime: python3.9
    Environment:
      Variables:
        TABLE_NAME: !Ref WeatherSubscriptionsTableFull
  Api:
    Cors:
      AllowMethods: "'POST,GET,OPTIONS,DELETE'"
      AllowHeaders: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
      AllowOrigin: "'*'"

Resources:
  WeatherSubscriptionsTableFull:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: WeatherSubscriptions
      AttributeDefinitions:
        - AttributeName: city
          AttributeType: S
        - AttributeName: email
          AttributeType: S
      KeySchema:
        - AttributeName: city
          KeyType: HASH
        - AttributeName: email
          KeyType: RANGE
      BillingMode: PAY_PER_REQUEST

  SubscribeFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/lambda_subscribe/
      Handler: index.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref WeatherSubscriptionsTableFull
        - Statement:
            - Effect: Allow
              Action:
                - sns:CreateTopic
                - sns:Subscribe
              Resource: '*'
      Events:
        SubscribeApi:
          Type: Api
          Properties:
            Path: /subscribe
            Method: post

  UnsubscribeFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/lambda_unsubscribe/
      Handler: index.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref WeatherSubscriptionsTableFull
        - Statement:
            - Effect: Allow
              Action:
                - sns:Unsubscribe
                - sns:ListSubscriptionsByTopic
              Resource: '*'
      Events:
        UnsubscribeApi:
          Type: Api
          Properties:
            Path: /unsubscribe
            Method: post

  WeatherCheckerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/lambda_weather_checker/
      Handler: index.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref WeatherSubscriptionsTableFull
        - Statement:
            - Effect: Allow
              Action:
                - sns:Publish
              Resource: '*'
      Events:
        CheckSchedule:
          Type: Schedule
          Properties:
            Schedule: rate(1 hour)

Outputs:
  ApiUrl:
    Description: "API Gateway endpoint URL"
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/"
